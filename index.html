<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncSchool</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #faf8f3;
            --beige: #f5f1e8;
            --gold: #d4a574;
            --dark: #2c2416;
            --sage: #a8b8a8;
            --light-gray: #e8e5de;
            --text: #3d3530;
            --text-light: #6b6560;
            --navy: #1e3a52;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--cream);
            color: var(--text);
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .hidden {
            display: none !important;
        }

        /* AUTH SCREEN */
        .auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--cream) 0%, var(--beige) 100%);
            padding: 20px;
        }

        .auth-card {
            background: var(--cream);
            padding: 60px 50px;
            border-radius: 2px;
            border: 1px solid var(--light-gray);
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
            margin: 0 auto;
            display: block;
        }

        .auth-button {
            width: 100%;
            padding: 16px 30px;
            background: var(--dark);
            color: var(--cream);
            border: 1px solid var(--dark);
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 20px;
        }

        .auth-button:hover {
            background: transparent;
            color: var(--dark);
        }

        /* MAIN APP */
        .app-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            background: var(--cream);
            border-bottom: 1px solid var(--light-gray);
            margin-bottom: 50px;
            padding-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 30px;
        }

        .header-left {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .header-left img {
            width: 80px;
            height: auto;
            margin-top: 5px;
        }

        .header-text h1 {
            font-size: 36px;
            margin-bottom: 4px;
            color: var(--dark);
            letter-spacing: 2px;
        }

        .header-text p {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--sage);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
        }

        .user-email {
            font-size: 12px;
            color: var(--text-light);
            font-weight: 300;
        }

        .btn {
            padding: 12px 24px;
            border: 1px solid var(--light-gray);
            background: transparent;
            color: var(--text);
            font-family: 'Lato', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--dark);
            color: var(--cream);
            border-color: var(--dark);
        }

        .content {
            display: grid;
            grid-template-columns: 1fr;
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: var(--cream);
            border: 1px solid var(--light-gray);
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .card h2 {
            font-size: 22px;
            margin-bottom: 30px;
            color: var(--dark);
            letter-spacing: 1px;
            position: relative;
            padding-bottom: 15px;
        }

        .card h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 30px;
            height: 2px;
            background: var(--gold);
        }

        .form-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 14px;
            border: 1px solid var(--light-gray);
            background: var(--cream);
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            color: var(--text);
            transition: all 0.3s ease;
            font-weight: 300;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--beige);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .checkbox-item:hover {
            background: var(--beige);
        }

        .checkbox-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--gold);
        }

        .checkbox-item label {
            cursor: pointer;
            font-weight: 400;
            margin: 0;
            font-size: 13px;
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: var(--dark);
            color: var(--cream);
            border: 1px solid var(--dark);
            font-family: 'Lato', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-save:hover {
            background: transparent;
            color: var(--dark);
        }

        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .success-message {
            background: rgba(168, 184, 168, 0.15);
            color: var(--sage);
            padding: 14px;
            margin-top: 15px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .error-message {
            background: rgba(212, 165, 116, 0.15);
            color: var(--gold);
            padding: 14px;
            margin-top: 15px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .section-header {
            background: var(--beige);
            padding: 15px 20px;
            margin: 25px 0 15px 0;
            border-left: 3px solid var(--gold);
        }

        .section-header h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--light-gray);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .header {
                flex-direction: column;
            }
        }

        @media (max-width: 640px) {
            .auth-card {
                padding: 40px 25px;
            }

            .card {
                padding: 25px;
            }

            .header img {
                max-width: 100%;
            }
        }
    </style>
</head>

            { name: 'Squash', category: 'sport', minAge: 11, maxAge: 13, grades: [5,6,7] },
            { name: 'Water Polo', category: 'sport', minAge: 11, maxAge: 13, grades: [5,6,7] },
            
            // CULTURE
            { name: 'Orchestra', category: 'culture', minAge: 7, maxAge: 13, grades: [1,2,3,4,5,6,7] },
            { name: 'Choir', category: 'culture', minAge: 7, maxAge: 13, grades: [1,2,3,4,5,6,7] },
            { name: 'Band', category: 'culture', minAge: 9, maxAge: 13, grades: [3,4,5,6,7] },
            { name: 'Drama', category: 'culture', minAge: 7, maxAge: 13, grades: [1,2,3,4,5,6,7] },
        ];

        function updateSportsCheckboxes() {
            const grade = document.getElementById('childGrade').value;
            const ageGroup = document.getElementById('ageGroup').value;
            const container = document.getElementById('sportsCheckboxes');

            if (!grade || !ageGroup) {
                container.innerHTML = '<p style="color: var(--text-light); font-size: 13px;">Select grade and age group first</p>';
                return;
            }

            const gradeNum = parseInt(grade.replace('Grade ', ''));
            const age = parseInt(ageGroup.replace('U', ''));

            const available = somersetActivities.filter(activity => {
                if (!activity.grades.includes(gradeNum)) return false;
                if (age < activity.minAge || age > activity.maxAge) return false;
                return true;
            });

            container.innerHTML = available.map((activity, index) => `
                <div class="checkbox-item">
                    <input type="checkbox" id="activity-${index}" value="${activity.name}" name="activities">
                    <label for="activity-${index}">${activity.name}</label>
                </div>
            `).join('');
        }

        function initGoogleAuth() {
            const redirectUri = window.location.href.split('?')[0];
            // ONLY ask for profile and email - NO Drive, NO Sheets
            const scope = 'profile email';

            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${encodeURIComponent(scope)}`;
            
            window.location.href = authUrl;
        }

        function handleAuthCallback() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');

            if (accessToken) {
                localStorage.setItem('accessToken', accessToken);
                window.location.hash = '';
                loadUserInfo(accessToken);
                showMainApp();
            }
        }

        function loadUserInfo(accessToken) {
            fetch('https://www.googleapis.com/oauth2/v2/userinfo?access_token=' + accessToken)
                .then(res => res.json())
                .then(data => {
                    currentUser = data;
                    const initials = (data.given_name ? data.given_name[0] : 'U') + (data.family_name ? data.family_name[0] : '');
                    document.getElementById('userName').textContent = data.name || 'User';
                    document.getElementById('userEmail').textContent = data.email;
                    document.getElementById('userAvatar').textContent = initials.toUpperCase();
                })
                .catch(err => console.error('Error:', err));
        }

        function showMainApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('childGrade').addEventListener('change', updateSportsCheckboxes);
            document.getElementById('ageGroup').addEventListener('change', updateSportsCheckboxes);

            // Form submission
            document.getElementById('signupForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const submitBtn = document.getElementById('submitBtn');
                const status = document.getElementById('signupStatus');
                
                // Disable button
                submitBtn.disabled = true;
                status.innerHTML = '<div style="color: var(--text-light); margin-top: 15px;"><span class="spinner"></span>Submitting...</div>';

                // Collect form data (includes parent info from Google sign-in)
                const formData = {
                    timestamp: new Date().toISOString(),
                    parentName: currentUser.name,
                    parentEmail: currentUser.email,
                    childName: document.getElementById('childName').value,
                    grade: document.getElementById('childGrade').value,
                    ageGroup: document.getElementById('ageGroup').value,
                    activities: Array.from(document.querySelectorAll('input[name="activities"]:checked')).map(el => el.value).join(', '),
                    extraLessons: Array.from(document.querySelectorAll('[id^="extra-"]:checked')).map(el => el.value).join(', '),
                    notes: document.getElementById('extraNotes').value
                };

                // TODO: Replace this URL with your Google Apps Script Web App URL
                const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';

                try {
                    // For now, just simulate success (replace with actual fetch call later)
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    // Uncomment this when you have the Google Apps Script URL:
                    // const response = await fetch(SCRIPT_URL, {
                    //     method: 'POST',
                    //     body: JSON.stringify(formData)
                    // });
                    // if (!response.ok) throw new Error('Submission failed');

                    status.innerHTML = '<div class="success-message">✓ Successfully signed up ' + formData.childName + '!</div>';
                    document.getElementById('signupForm').reset();
                    updateSportsCheckboxes();
                    
                } catch (error) {
                    status.innerHTML = '<div class="error-message">⚠ Something went wrong. Please try again or contact us directly.</div>';
                    console.error('Error:', error);
                } finally {
                    submitBtn.disabled = false;
                }
            });
        });

        function logout() {
            localStorage.removeItem('accessToken');
            currentUser = null;
            location.reload();
        }

        if (window.location.hash.includes('access_token')) {
            handleAuthCallback();
        } else if (localStorage.getItem('accessToken')) {
            showMainApp();
            const accessToken = localStorage.getItem('accessToken');
            loadUserInfo(accessToken);
        }
    </script>
</body>
</html>
